name: Deploy to GitHub Pages

# Deploys the static site to GitHub Pages on every push to main.
# One-time setup: in repo Settings → Pages → Build and deployment,
# set Source = "GitHub Actions". After that this workflow deploys automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        # Publish only the site itself (keeps docs/ and mockups/ off the live URL).
        run: |
          mkdir -p _site
          cp index.html styles.css script.js _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
